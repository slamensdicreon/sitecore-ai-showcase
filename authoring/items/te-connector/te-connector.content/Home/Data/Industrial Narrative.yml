    - ID: "00000000-0000-0000-0000-000000000000"
      Hint: Lead Text
      Value: |
        Industrial environments punish weak links. TE products are engineered to survive vibration, chemicals, extreme temperatures, and decades of continuous operation.
    - ID: "00000000-0000-0000-0000-000000000000"
      Hint: Body
      Value: |
        <p>From M12 circular connectors with IP67 protection for factory-floor Ethernet to DIN rail terminal blocks rated for 800V, TE's industrial portfolio covers every layer of the automation stack.</p><p>Our sensor technologies — including piezoelectric vibration sensors for condition monitoring and RTD assemblies for process control — provide the data backbone for predictive maintenance strategies.</p>
