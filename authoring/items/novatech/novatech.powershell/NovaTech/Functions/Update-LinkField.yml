Path: /sitecore/system/Modules/PowerShell/Script Library/NovaTech/Functions/Update-LinkField
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    function Update-LinkField {
        [CmdLetBinding()]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            $Item,

            [Parameter(Mandatory = $true)]
            [string]$FieldName,

            [Parameter(Mandatory = $false)]
            [Sitecore.Data.Items.Item]$TargetItem,

            [Parameter(Mandatory = $false)]
            [string]$Url,

            [Parameter(Mandatory = $false)]
            [string]$Text
        )

        process {
            $Item.Editing.BeginEdit()
            [Sitecore.Data.Fields.LinkField]$linkField = $Item.Fields[$FieldName]
            if ($TargetItem) {
                $linkField.LinkType = "internal"
                $linkField.TargetID = $TargetItem.ID
                $linkField.Url = ""
            }
            elseif ($Url) {
                $linkField.LinkType = "external"
                $linkField.Url = $Url
                $linkField.TargetID = [Sitecore.Data.ID]::Null
            }
            $linkField.QueryString = ""
            $linkField.Target = ""
            $linkField.Class = ""
            if ($Text) {
                $linkField.Text = $Text
            }
            $Item.Editing.EndEdit()
            return $Item
        }
    }
